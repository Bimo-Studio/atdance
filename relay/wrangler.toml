name = "atdance-relay"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Optional: invite-only queue (PRD P5). Set `INVITE_ONLY=1` and list DIDs in production.
[vars]
INVITE_ONLY = "1"
ATPROTO_ALLOWLIST_DIDS = "did:plc:ya2boguixgy4757qqtw7gwch, did:plc:qdsp7mb3o7irmv7whyjexy7g, did:plc:dzvxvsiy3maw4iarpvizsj67, did:plc:7mnpet2pvof2llhpcwattscf"
# Browser origins allowed to call relay HTTP (allowlist check + admin API with Authorization).
# `*` reflects the request Origin (ok for dev). Production: list every app origin, no trailing slashes,
# e.g. https://dance.malldao.xyz,https://atdance.vercel.app — must include the exact host that serves /admin.
# Cloudflare dashboard vars override these [vars] on deploy if set.
ATDANCE_APP_ORIGINS = "*"
# Admin API: OAuth token sub must match this handle’s resolved DID (see relay/src/adminVerify.ts).
ATDANCE_ADMIN_HANDLE = "distributed.camp"
# Optional: pin admin DID if handle resolution and OAuth sub must match exactly (set in dashboard if needed).
# ATDANCE_ADMIN_DID = "did:plc:…"
#
# Browser /admin sign-in: set Wrangler secrets ATDANCE_ADMIN_PASSWORD (operator-chosen) and
# ATDANCE_ADMIN_SESSION_SECRET (long random; signs short-lived session JWTs after password login).
# Optional: ATDANCE_ADMIN_API_TOKEN for scripts/curl only (Bearer on /admin/*).
# OAuth JWT admin still works when the AS publishes a non-empty JWKS; otherwise use password login or JWKS overrides:
#   ATDANCE_OAUTH_AS_JWKS_URL or ATDANCE_OAUTH_AS_JWKS_JSON

# Live allowlist edits (KV created in Cloudflare; binding name must stay ALLOWLIST_KV).
[[kv_namespaces]]
binding = "ALLOWLIST_KV"
id = "bf4fa3b54b074f819740e9713bd93e86"

# Public hostname via a Worker Route (you create the DNS record yourself — see deployment doc).
# Requires `malldao.xyz` in this Cloudflare account. Remove this block to use only *.workers.dev.
[[routes]]
pattern = "relay.malldao.xyz/*"
zone_name = "malldao.xyz"
